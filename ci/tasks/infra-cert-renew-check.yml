platform: linux

image_resource:
  type: registry-image
  source:
    repository: alpine
    tag: "3.21"

params:
  SSH_HOST: ""
  SSH_USER: ""
  SSH_PRIVATE_KEY: ""
  CERTBOT_EMAIL: ""
  CERTBOT_DOMAINS: ""

inputs:
  - name: infra-ci

run:
  path: sh
  args:
    - -exc
    - |
      apk add --no-cache openssh-client

      SSH_KEY_FILE="$(mktemp)"
      printf '%s\n' "$SSH_PRIVATE_KEY" > "$SSH_KEY_FILE"
      chmod 600 "$SSH_KEY_FILE"
      SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -i ${SSH_KEY_FILE}"
      SSH_TARGET="${SSH_USER}@${SSH_HOST}"

      DOMAIN_FLAGS=""
      for domain in ${CERTBOT_DOMAINS}; do
        DOMAIN_FLAGS="${DOMAIN_FLAGS} -d ${domain}"
      done

      CERT_META=$(ssh ${SSH_OPTS} "${SSH_TARGET}" \
        "docker run --rm -v infra-certbot-certs:/etc/letsencrypt alpine:3.21 sh -ec '
          apk add --no-cache openssl >/dev/null
          cert=/etc/letsencrypt/live/infra-edge/fullchain.pem
          if [ ! -f \"\$cert\" ]; then
            echo missing
            exit 0
          fi
          issuer=$(openssl x509 -in \"\$cert\" -noout -issuer | sed \"s/^issuer=//\")
          subject=$(openssl x509 -in \"\$cert\" -noout -subject | sed \"s/^subject=//\")
          if [ \"\$issuer\" = \"\$subject\" ]; then
            echo self-signed
          else
            echo trusted
          fi
          if openssl x509 -in \"\$cert\" -checkend 2419200 -noout >/dev/null 2>&1; then
            echo gt28d
          else
            echo le28d
          fi
        '")

      CERT_STATE="$(printf '%s\n' "$CERT_META" | sed -n '1p')"
      CERT_EXPIRY="$(printf '%s\n' "$CERT_META" | sed -n '2p')"

      echo "Current cert state: ${CERT_STATE}, expiry window: ${CERT_EXPIRY}"

      if [ "$CERT_STATE" = "trusted" ] && [ "$CERT_EXPIRY" = "gt28d" ]; then
        echo "Trusted cert valid for > 28 days. No renewal required."
      else
        echo "Certificate missing/self-signed/expiring <= 28 days. Running certbot certonly."
        ssh ${SSH_OPTS} "${SSH_TARGET}" \
          "docker run --rm \
            -v infra-certbot-certs:/etc/letsencrypt \
            -v infra-certbot-www:/var/www/certbot \
            certbot/certbot:latest certonly \
            --webroot --webroot-path /var/www/certbot \
            --email ${CERTBOT_EMAIL} \
            --agree-tos --no-eff-email \
            --non-interactive \
            --cert-name infra-edge \
            --force-renewal \
            ${DOMAIN_FLAGS}"
        ssh ${SSH_OPTS} "${SSH_TARGET}" "docker exec infra-nginx nginx -s reload"
      fi

      ssh ${SSH_OPTS} "${SSH_TARGET}" \
        "curl -sf --max-time 10 https://concourse.dtsoft.cloud/ || echo 'HTTPS check failed (may be expected in CI)'"

      echo "=== Infra cert check complete ==="
