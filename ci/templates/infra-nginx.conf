    server {
        listen 443 ssl;
        http2 on;
        server_name monitor.dtsoft.cloud;

        ssl_certificate /etc/letsencrypt/live/dtsoft.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dtsoft.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/dtsoft.cloud/chain.pem;
        resolver 127.0.0.11 valid=30s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        limit_conn addr 50;

        if ($is_bad_bot) { return 444; }
        location ~* /(?:vendor/phpunit/|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|cgi-bin/|\.env$|\.git/|\.aws/|\.docker/|phpmyadmin|phpunit|eval-stdin|wp-config|adminer|\.htaccess|\.htpasswd|telescope/|_ignition/) {
            access_log off;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = /loki/ready {
            set $loki_upstream http://loki:3100;
            proxy_pass $loki_upstream/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_read_timeout 30;
            access_log off;
        }

        location = /loki/api/v1/push {
            limit_except POST { deny all; }
            set $loki_upstream http://loki:3100;
            proxy_pass $loki_upstream/loki/api/v1/push;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_read_timeout 30;
            access_log off;
        }

        location ^~ /loki/api/v1/ { return 403; }
        location ^~ /loki/ { return 403; }

        location / {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade_grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_read_timeout 90;
        }
    }

