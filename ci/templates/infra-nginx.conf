        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        limit_conn addr 50;

        if ($is_bad_bot) { return 444; }
        location ~* /(?:vendor/phpunit/|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|cgi-bin/|\.env$|\.git/|\.aws/|\.docker/|phpmyadmin|phpunit|eval-stdin|wp-config|adminer|\.htaccess|\.htpasswd|telescope/|_ignition/) {
            access_log off;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            set $keycloak_upstream http://iam-keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_read_timeout 90;
        }
    }

