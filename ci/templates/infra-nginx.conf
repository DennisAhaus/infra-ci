user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" $request_time';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    map $http_upgrade $connection_upgrade_grafana {
        default upgrade;
        ''      close;
    }

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    map $http_user_agent $is_bad_bot {
        default                 0;
        ""                      1;
        ~*libredtail            1;
        ~*zgrab                 1;
        ~*masscan               1;
        ~*nuclei                1;
        ~*sqlmap                1;
        ~*nikto                 1;
        ~*nmap                  1;
        ~*dirbuster             1;
        ~*gobuster              1;
        ~*wpscan                1;
        ~*httpx                 1;
        ~*censys                1;
        ~*shodan                1;
        ~*netcraft              1;
        ~*whatweb               1;
        ~*petalbot              1;
        ~*semrushbot            1;
        ~*ahrefsbot             1;
        ~*mj12bot               1;
        ~*dotbot                1;
        ~*blexbot               1;
        ~*python-requests       1;
        ~*python-urllib         1;
        ~*scrapy                1;
    }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name dtsoft.cloud www.dtsoft.cloud;

        ssl_certificate /etc/letsencrypt/live/dtsoft.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dtsoft.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/dtsoft.cloud/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        limit_conn addr 50;

        if ($is_bad_bot) { return 444; }
        location ~* /(?:vendor/phpunit/|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|cgi-bin/|\.env$|\.git/|\.aws/|\.docker/|phpmyadmin|phpunit|eval-stdin|wp-config|adminer|\.htaccess|\.htpasswd|telescope/|_ignition/) {
            access_log off;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://apm.dtsoft.cloud$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name concourse.dtsoft.cloud;

        ssl_certificate /etc/letsencrypt/live/dtsoft.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dtsoft.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/dtsoft.cloud/chain.pem;
        resolver 127.0.0.11 valid=30s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        limit_conn addr 50;

        if ($is_bad_bot) { return 444; }
        location ~* /(?:vendor/phpunit/|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|cgi-bin/|\.env$|\.git/|\.aws/|\.docker/|phpmyadmin|phpunit|eval-stdin|wp-config|adminer|\.htaccess|\.htpasswd|telescope/|_ignition/) {
            access_log off;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://host.docker.internal:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_read_timeout 90;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name auth.dtsoft.cloud;

        ssl_certificate /etc/letsencrypt/live/dtsoft.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dtsoft.cloud/privkey.pem;
